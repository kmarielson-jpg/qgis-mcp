name: Release QGIS Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: zip -r qgis_mcp_plugin.zip qgis_mcp_plugin/ -x "qgis_mcp_plugin/__pycache__/*"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: qgis_mcp_plugin.zip
